<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOVA ARENA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg: #04060F;
    --accent: #00F0FF;
    --accent2: #FF2D6B;
    --accent3: #FFE600;
    --accent4: #39FF14;
    --ui-bg: rgba(4,6,15,0.85);
    --ui-border: rgba(0,240,255,0.2);
    --font-hud: 'Orbitron', monospace;
    --font-body: 'Exo 2', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: var(--font-body);
    color: #fff;
    touch-action: none;
    user-select: none;
  }

  /* ═══════════════════════════════
     CANVAS
  ═══════════════════════════════ */
  #gameCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  /* ═══════════════════════════════
     HUD
  ═══════════════════════════════ */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 16px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
    z-index: 10;
  }

  .hud-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-val {
    font-family: var(--font-hud);
    font-size: 1.5rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 1px;
    text-shadow: 0 0 12px currentColor;
  }

  .hud-val.cyan  { color: var(--accent); }
  .hud-val.red   { color: var(--accent2); }
  .hud-val.gold  { color: var(--accent3); }

  .hud-lbl {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  /* Health bar */
  #healthWrap {
    position: fixed;
    bottom: 170px;
    left: 50%;
    transform: translateX(-50%);
    width: min(280px, 70vw);
    z-index: 10;
    pointer-events: none;
  }

  #healthBar {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255,45,107,0.3);
  }

  #healthFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #FF2D6B, #FF6B9D);
    border-radius: 10px;
    transition: width 0.2s, background 0.3s;
    box-shadow: 0 0 10px rgba(255,45,107,0.6);
  }

  #healthLbl {
    font-family: var(--font-hud);
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    margin-top: 4px;
  }

  /* XP bar */
  #xpWrap {
    position: fixed;
    bottom: 158px;
    left: 50%;
    transform: translateX(-50%);
    width: min(280px, 70vw);
    z-index: 10;
    pointer-events: none;
  }

  #xpBar {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
  }

  #xpFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00F0FF, #39FF14);
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(0,240,255,0.5);
    transition: width 0.3s;
  }

  /* Wave badge */
  #waveBadge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: var(--font-hud);
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--accent3);
    text-shadow: 0 0 30px var(--accent3), 0 0 60px rgba(255,230,0,0.4);
    letter-spacing: 4px;
    pointer-events: none;
    z-index: 50;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
  }

  /* Weapon indicator */
  #weaponHud {
    position: fixed;
    bottom: 175px;
    right: 18px;
    z-index: 10;
    pointer-events: none;
    text-align: right;
  }

  .weapon-name {
    font-family: var(--font-hud);
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent);
  }

  .weapon-ammo {
    font-family: var(--font-hud);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  /* ═══════════════════════════════
     JOYSTICK
  ═══════════════════════════════ */
  #joystickZone {
    position: fixed;
    bottom: 0; left: 0;
    width: 50%; height: 155px;
    z-index: 20;
  }

  #joystickBase {
    position: absolute;
    bottom: 30px; left: 40px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(0,240,255,0.04);
    border: 2px solid rgba(0,240,255,0.15);
    display: flex; align-items: center; justify-content: center;
  }

  #joystickKnob {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(0,240,255,0.6), rgba(0,240,255,0.15));
    border: 2px solid rgba(0,240,255,0.5);
    box-shadow: 0 0 16px rgba(0,240,255,0.3);
    transition: transform 0.05s;
    position: relative;
  }

  /* ═══════════════════════════════
     SHOOT BUTTON
  ═══════════════════════════════ */
  #shootZone {
    position: fixed;
    bottom: 0; right: 0;
    width: 50%; height: 155px;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #shootBtn {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(255,45,107,0.5), rgba(255,45,107,0.1));
    border: 2px solid rgba(255,45,107,0.5);
    box-shadow: 0 0 20px rgba(255,45,107,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 2px;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
    -webkit-tap-highlight-color: transparent;
  }

  #shootBtn:active, #shootBtn.firing {
    transform: scale(0.9);
    box-shadow: 0 0 30px rgba(255,45,107,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  #shootBtn .fire-icon {
    font-size: 1.6rem;
    line-height: 1;
    filter: drop-shadow(0 0 6px rgba(255,45,107,0.8));
  }

  #shootBtn .fire-lbl {
    font-family: var(--font-hud);
    font-size: 0.45rem;
    letter-spacing: 2px;
    color: rgba(255,45,107,0.8);
  }

  /* Bomb button */
  #bombBtn {
    position: fixed;
    bottom: 120px;
    right: 22px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,230,0,0.08);
    border: 2px solid rgba(255,230,0,0.3);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    cursor: pointer;
    z-index: 20;
    transition: transform 0.1s;
  }

  #bombBtn:active { transform: scale(0.88); }

  #bombBtn .bomb-icon { font-size: 1.2rem; line-height: 1; }
  #bombBtn .bomb-count {
    font-family: var(--font-hud);
    font-size: 0.5rem;
    color: var(--accent3);
    letter-spacing: 1px;
  }

  /* ═══════════════════════════════
     SCREENS
  ═══════════════════════════════ */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 24px;
    text-align: center;
    background: rgba(4,6,15,0.96);
    backdrop-filter: blur(20px);
  }

  .screen.hidden { display: none; }

  /* Start screen */
  .game-logo {
    font-family: var(--font-hud);
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, #00F0FF 0%, #39FF14 50%, #00F0FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0,240,255,0.5));
    margin-bottom: 6px;
    animation: logoPulse 2s ease-in-out infinite;
  }

  @keyframes logoPulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,240,255,0.5)); }
    50%       { filter: drop-shadow(0 0 40px rgba(0,240,255,0.9)); }
  }

  .game-sub {
    font-family: var(--font-hud);
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 40px;
  }

  .start-stats {
    display: flex;
    gap: 16px;
    margin-bottom: 36px;
    width: 100%;
    max-width: 320px;
  }

  .start-stat {
    flex: 1;
    background: rgba(0,240,255,0.04);
    border: 1px solid rgba(0,240,255,0.12);
    border-radius: 12px;
    padding: 14px 8px;
  }

  .start-stat-val {
    font-family: var(--font-hud);
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent);
    display: block;
  }

  .start-stat-lbl {
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    display: block;
    margin-top: 3px;
  }

  .how-to {
    display: flex;
    gap: 20px;
    margin-bottom: 36px;
    width: 100%;
    max-width: 320px;
  }

  .how-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .how-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }

  .how-txt {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.4;
  }

  .btn-primary {
    background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(0,240,255,0.05));
    border: 2px solid var(--accent);
    border-radius: 50px;
    padding: 16px 48px;
    font-family: var(--font-hud);
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent);
    box-shadow: 0 0 20px rgba(0,240,255,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary:active {
    transform: scale(0.95);
    box-shadow: 0 0 30px rgba(0,240,255,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* Game Over screen */
  .go-title {
    font-family: var(--font-hud);
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--accent2);
    text-shadow: 0 0 30px var(--accent2);
    margin-bottom: 8px;
    animation: goShake 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes goShake {
    0%  { transform: scale(0.5) rotate(-3deg); opacity: 0; }
    100%{ transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .go-sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  .go-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 280px;
    margin-bottom: 30px;
  }

  .go-stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 8px;
  }

  .go-stat-val {
    font-family: var(--font-hud);
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--accent);
    display: block;
    text-shadow: 0 0 8px var(--accent);
  }

  .go-stat-lbl {
    font-size: 0.58rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    display: block;
    margin-top: 3px;
  }

  /* Upgrade screen */
  #upgradeScreen {
    background: rgba(4,6,15,0.97);
  }

  .upgrade-title {
    font-family: var(--font-hud);
    font-size: 1rem;
    letter-spacing: 4px;
    color: var(--accent3);
    text-shadow: 0 0 12px var(--accent3);
    margin-bottom: 4px;
  }

  .upgrade-sub {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    margin-bottom: 28px;
  }

  .upgrade-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }

  .upgrade-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .upgrade-card:active {
    transform: scale(0.97);
  }

  .upgrade-card.rarity-common  { border-color: rgba(255,255,255,0.15); }
  .upgrade-card.rarity-rare    { border-color: rgba(0,240,255,0.35); background: rgba(0,240,255,0.04); }
  .upgrade-card.rarity-epic    { border-color: rgba(180,0,255,0.45); background: rgba(180,0,255,0.05); }

  .upgrade-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .rarity-common  .upgrade-icon { background: rgba(255,255,255,0.06); }
  .rarity-rare    .upgrade-icon { background: rgba(0,240,255,0.1); }
  .rarity-epic    .upgrade-icon { background: rgba(180,0,255,0.12); }

  .upgrade-info { flex: 1; min-width: 0; }

  .upgrade-name {
    font-family: var(--font-hud);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    margin-bottom: 4px;
  }

  .rarity-rare  .upgrade-name { color: var(--accent); }
  .rarity-epic  .upgrade-name { color: #C060FF; }

  .upgrade-desc {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.4);
    line-height: 1.4;
  }

  .upgrade-badge {
    font-family: var(--font-hud);
    font-size: 0.45rem;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 50px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .rarity-common .upgrade-badge { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
  .rarity-rare   .upgrade-badge { background: rgba(0,240,255,0.12); color: var(--accent); }
  .rarity-epic   .upgrade-badge { background: rgba(180,0,255,0.15); color: #C060FF; }

  /* Floating damage numbers */
  .dmg-num {
    position: fixed;
    font-family: var(--font-hud);
    font-size: 1rem;
    font-weight: 900;
    pointer-events: none;
    z-index: 15;
    animation: dmgFloat 0.9s ease-out forwards;
  }

  @keyframes dmgFloat {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-50px) scale(0.7); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-block">
    <span class="hud-val cyan" id="hudScore">0</span>
    <span class="hud-lbl">Score</span>
  </div>
  <div class="hud-block">
    <span class="hud-val gold" id="hudWave">1</span>
    <span class="hud-lbl">Vague</span>
  </div>
  <div class="hud-block">
    <span class="hud-val red" id="hudKills">0</span>
    <span class="hud-lbl">Kills</span>
  </div>
</div>

<div id="healthWrap">
  <div id="healthBar"><div id="healthFill"></div></div>
  <div id="healthLbl">SANTÉ</div>
</div>

<div id="xpWrap">
  <div id="xpBar"><div id="xpFill"></div></div>
</div>

<div id="weaponHud">
  <div class="weapon-name" id="weaponName">BLASTER</div>
  <div class="weapon-ammo" id="weaponAmmo">∞</div>
</div>

<div id="waveBadge">VAGUE 1</div>

<!-- Controls -->
<div id="joystickZone">
  <div id="joystickBase">
    <div id="joystickKnob"></div>
  </div>
</div>

<div id="shootZone">
  <div id="shootBtn">
    <span class="fire-icon">🔥</span>
    <span class="fire-lbl">FIRE</span>
  </div>
</div>

<div id="bombBtn">
  <span class="bomb-icon">💥</span>
  <span class="bomb-count" id="bombCount">3</span>
</div>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <div class="game-logo">NOVA<br>ARENA</div>
  <div class="game-sub">WAVE SURVIVAL</div>

  <div class="how-to">
    <div class="how-item">
      <div class="how-icon">🕹️</div>
      <div class="how-txt">Joystick gauche pour bouger</div>
    </div>
    <div class="how-item">
      <div class="how-icon">🔥</div>
      <div class="how-txt">Bouton droit pour tirer</div>
    </div>
    <div class="how-item">
      <div class="how-icon">💥</div>
      <div class="how-txt">Bombe pour tout détruire</div>
    </div>
  </div>

  <div class="start-stats" id="startStats" style="display:none">
    <div class="start-stat">
      <span class="start-stat-val" id="bestScore">0</span>
      <span class="start-stat-lbl">Meilleur</span>
    </div>
    <div class="start-stat">
      <span class="start-stat-val" id="bestWave">0</span>
      <span class="start-stat-lbl">Vague max</span>
    </div>
  </div>

  <button class="btn-primary" id="startBtn">JOUER</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameOverScreen">
  <div class="go-title">GAME OVER</div>
  <div class="go-sub">TU AS ÉTÉ ÉLIMINÉ</div>
  <div class="go-stats">
    <div class="go-stat">
      <span class="go-stat-val" id="goScore">0</span>
      <span class="go-stat-lbl">Score</span>
    </div>
    <div class="go-stat">
      <span class="go-stat-val" id="goWave">0</span>
      <span class="go-stat-lbl">Vague</span>
    </div>
    <div class="go-stat">
      <span class="go-stat-val" id="goKills">0</span>
      <span class="go-stat-lbl">Kills</span>
    </div>
    <div class="go-stat">
      <span class="go-stat-val" id="goBest">0</span>
      <span class="go-stat-lbl">Record</span>
    </div>
  </div>
  <button class="btn-primary" id="restartBtn">REJOUER</button>
</div>

<!-- UPGRADE SCREEN -->
<div class="screen hidden" id="upgradeScreen">
  <div class="upgrade-title">NIVEAU SUPÉRIEUR</div>
  <div class="upgrade-sub">Choisis une amélioration</div>
  <div class="upgrade-cards" id="upgradeCards"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  NOVA ARENA — Wave Survival Game
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ── Resize ──────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── State ───────────────────────────────────────────────
const STATE = { START:0, PLAYING:1, UPGRADE:2, GAMEOVER:3 };
let state = STATE.START;

let score = 0, kills = 0, wave = 1, frameCount = 0;
let bestScore = parseInt(localStorage.getItem('novaScore')||'0');
let bestWave  = parseInt(localStorage.getItem('novaWave')||'0');

// ── Player ──────────────────────────────────────────────
const player = {
  x: 0, y: 0,
  r: 18,
  hp: 100, maxHp: 100,
  speed: 3.2,
  xp: 0, xpNext: 100, level: 1,
  bombs: 3,
  invincible: 0,
  trail: [],
  // upgrades
  fireRate: 180,    // ms between shots
  damage: 20,
  bulletSpeed: 8,
  bulletCount: 1,
  spread: 0,
  pierce: 0,
  shield: 0,
  magnet: 0,
  regen: 0,
};

// ── Weapons ─────────────────────────────────────────────
const WEAPONS = {
  blaster: { name:'BLASTER', color:'#00F0FF', bulletR:5, fireRate:180 },
  shotgun: { name:'SHOTGUN', color:'#FFB547', bulletR:4, fireRate:400 },
  laser:   { name:'LASER',   color:'#FF2D6B', bulletR:3, fireRate:80  },

// ─────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────
function initGame() {
  score = 0; kills = 0; wave = 1; frameCount = 0;
  player.x = canvas.width/2;
  player.y = canvas.height/2;
  player.hp = 100; player.maxHp = 100;
  player.speed = 3.2; player.xp = 0; player.xpNext = 100; player.level = 1;
  player.bombs = 3; player.invincible = 0;
  player.fireRate = 180; player.damage = 20;
  player.bulletSpeed = 8; player.bulletCount = 1;
  player.spread = 0; player.pierce = 0;
  player.shield = 0; player.magnet = 0; player.regen = 0;
  player.trail = [];
  currentWeapon = 'blaster';
  bullets = []; enemies = []; particles = []; orbs = []; powerups = [];
  initStars();
  spawnWave(1);
  updateHUD();
}

// ─────────────────────────────────────────────────────────
//  WAVE SPAWNING
// ─────────────────────────────────────────────────────────
function spawnWave(w) {
  const cx = canvas.width/2, cy = canvas.height/2;
  const margin = 60;

  function spawnPos() {
    const side = Math.floor(Math.random()*4);
    if (side===0) return { x: Math.random()*canvas.width, y: -margin };
    if (side===1) return { x: canvas.width+margin, y: Math.random()*canvas.height };
    if (side===2) return { x: Math.random()*canvas.width, y: canvas.height+margin };
    return { x: -margin, y: Math.random()*canvas.height };
  }

  function makeEnemy(type) {
    const t = ENEMY_TYPES[type];
    const pos = spawnPos();
    return {
      ...JSON.parse(JSON.stringify(t)),
      x: pos.x, y: pos.y,
      maxHp: t.hp,
      angle: 0, shootTimer: t.shootTimer||0,
      flash: 0, pulseT: Math.random()*Math.PI*2,
      id: Math.random(),
    };
  }

  // Boss every 5 waves
  if (w % 5 === 0) {
    const boss = makeEnemy('boss');
    boss.hp = 800 + (w/5)*400;
    boss.maxHp = boss.hp;
    enemies.push(boss);
    showWaveBanner('BOSS !!!');
    return;
  }

  const count = 4 + w*2;
  for (let i = 0; i < count; i++) {
    let type = 'grunt';
    const r = Math.random();
    if (w >= 2 && r < 0.15) type = 'tank';
    else if (w >= 3 && r < 0.25) type = 'speeder';
    else if (w >= 4 && r < 0.35) type = 'sniper';
    enemies.push(makeEnemy(type));
  }
  showWaveBanner(`VAGUE ${w}`);
}

function showWaveBanner(text) {
  const el = document.getElementById('waveBadge');
  el.textContent = text;
  el.style.transform = 'translate(-50%,-50%) scale(1)';
  el.style.opacity = '1';
  setTimeout(() => {
    el.style.transform = 'translate(-50%,-50%) scale(1.2)';
    el.style.opacity = '0';
  }, 1400);
}

// ─────────────────────────────────────────────────────────
//  SHOOTING
// ─────────────────────────────────────────────────────────
function fireWeapon() {
  const now = Date.now();
  if (now - lastShot < player.fireRate) return;
  lastShot = now;

  // Aim at nearest enemy
  let tx = player.x, ty = player.y - 1;
  let minDist = Infinity;
  for (const e of enemies) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < minDist) { minDist = d; tx = e.x; ty = e.y; }
  }

  const baseAngle = Math.atan2(ty - player.y, tx - player.x);
  const weapon = WEAPONS[currentWeapon];

  for (let i = 0; i < player.bulletCount; i++) {
    const offset = player.bulletCount > 1
      ? (i / (player.bulletCount-1) - 0.5) * player.spread * 2
      : 0;
    const angle = baseAngle + offset;
    bullets.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * player.bulletSpeed,
      vy: Math.sin(angle) * player.bulletSpeed,
      r: weapon.bulletR,
      color: weapon.color,
      damage: player.damage,
      pierce: player.pierce,
      hits: 0,
      life: 80,
    });
  }

  // Muzzle flash
  spawnParticles(player.x, player.y, weapon.color, 4, 2);
}

// ─────────────────────────────────────────────────────────
//  BOMB
// ─────────────────────────────────────────────────────────
function useBomb() {
  if (player.bombs <= 0) return;
  player.bombs--;
  document.getElementById('bombCount').textContent = player.bombs;

  // Screen flash
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:rgba(255,230,0,0.25);pointer-events:none;z-index:200;animation:none;';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 300);

  // Kill all enemies
  for (const e of enemies) {
    spawnParticles(e.x, e.y, e.color, 20, 4);
    spawnOrb(e.x, e.y, e.xp);
    score += e.score;
    kills++;
  }
  enemies = [];
  score += 500;
  updateHUD();
}

// ─────────────────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count=10, speed=3) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const s = (Math.random() * speed + 1);
    particles.push({
      x, y,
      vx: Math.cos(angle) * s,
      vy: Math.sin(angle) * s,
      r: Math.random() * 3 + 1,
      color,
      life: Math.random() * 30 + 20,
      maxLife: 50,
    });
  }
}

function spawnOrb(x, y, xpVal) {
  orbs.push({
    x, y,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2,
    r: 5 + Math.min(xpVal/20, 6),
    xp: xpVal,
    life: 300,
    t: 0,
  });
}

// ─────────────────────────────────────────────────────────
//  HUD UPDATE
// ─────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hudScore').textContent = score.toLocaleString();
  document.getElementById('hudWave').textContent  = wave;
  document.getElementById('hudKills').textContent = kills;

  const hp = Math.max(0, player.hp / player.maxHp * 100);
  document.getElementById('healthFill').style.width = hp + '%';
  document.getElementById('healthFill').style.background =
    hp > 50 ? 'linear-gradient(90deg,#FF2D6B,#FF6B9D)' :
    hp > 25 ? 'linear-gradient(90deg,#FF7A00,#FFB547)' :
              'linear-gradient(90deg,#FF0000,#FF5555)';

  const xpPct = player.xp / player.xpNext * 100;
  document.getElementById('xpFill').style.width = xpPct + '%';

  document.getElementById('weaponName').textContent = WEAPONS[currentWeapon].name;
  document.getElementById('bombCount').textContent = player.bombs;
}

// ─────────────────────────────────────────────────────────
//  LEVEL UP / UPGRADE
// ─────────────────────────────────────────────────────────
function gainXP(amount) {
  player.xp += amount;
  if (player.xp >= player.xpNext) {
    player.xp -= player.xpNext;
    player.xpNext = Math.floor(player.xpNext * 1.4);
    player.level++;
    showUpgradeScreen();
  }
}

function showUpgradeScreen() {
  if (state !== STATE.PLAYING) return;
  state = STATE.UPGRADE;
  document.getElementById('upgradeScreen').classList.remove('hidden');

  // Pick 3 random upgrades (weighted by rarity)
  const pool = [...UPGRADES];
  const picks = [];
  const rarityWeight = { common:60, rare:30, epic:10 };

  while (picks.length < 3 && pool.length > 0) {
    let totalW = pool.reduce((s,u) => s + rarityWeight[u.rarity], 0);
    let rand = Math.random() * totalW;
    for (let i = 0; i < pool.length; i++) {
      rand -= rarityWeight[pool[i].rarity];
      if (rand <= 0) { picks.push(pool.splice(i,1)[0]); break; }
    }
  }

  const container = document.getElementById('upgradeCards');
  container.innerHTML = '';
  for (const up of picks) {
    const card = document.createElement('div');
    card.className = `upgrade-card rarity-${up.rarity}`;
    card.innerHTML = `
      <div class="upgrade-icon">${up.icon}</div>
      <div class="upgrade-info">
        <div class="upgrade-name">${up.name}</div>
        <div class="upgrade-desc">${up.desc}</div>
      </div>
      <div class="upgrade-badge">${up.rarity}</div>`;
    card.addEventListener('click', () => {
      up.apply(player);
      document.getElementById('upgradeScreen').classList.add('hidden');
      state = STATE.PLAYING;
      updateHUD();
    });
    container.appendChild(card);
  }
}

function enemyShoot(e) {
  const angle = Math.atan2(player.y - e.y, player.x - e.x);
  bullets.push({
    x: e.x, y: e.y,
    vx: Math.cos(angle) * 4,
    vy: Math.sin(angle) * 4,
    r: 5, color: '#FFEE00',
    damage: 12, pierce: 0, hits: 0, life: 100,
    enemy: true,
  });
}

// ─────────────────────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────────────────────
function drawShape(x, y, r, shape, color, angle=0, flash=0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const fc = flash > 0 ? '#ffffff' : color;
  ctx.fillStyle = fc;
  ctx.strokeStyle = fc;
  ctx.shadowColor = color;
  ctx.shadowBlur = 15;

  ctx.beginPath();
  if (shape === 'triangle') {
    ctx.moveTo(0, -r);
    ctx.lineTo(r*0.87, r*0.5);
    ctx.lineTo(-r*0.87, r*0.5);
    ctx.closePath();
  } else if (shape === 'hexagon') {
    for (let i=0;i<6;i++) {
      const a = (i/6)*Math.PI*2 - Math.PI/6;
      i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
             : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
  } else if (shape === 'diamond') {
    ctx.moveTo(0,-r); ctx.lineTo(r*0.6,0);
    ctx.lineTo(0,r); ctx.lineTo(-r*0.6,0);
    ctx.closePath();
  } else if (shape === 'star') {
    for (let i=0;i<10;i++) {
      const a = (i/10)*Math.PI*2 - Math.PI/2;
      const rad = i%2===0 ? r : r*0.45;
      i===0 ? ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad)
             : ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
    }
    ctx.closePath();
  } else if (shape === 'boss') {
    for (let i=0;i<8;i++) {
      const a = (i/8)*Math.PI*2;
      const rad = i%2===0 ? r : r*0.7;
      i===0 ? ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad)
             : ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad);
    }
    ctx.closePath();
  } else {
    ctx.arc(0,0,r,0,Math.PI*2);
  }

  ctx.globalAlpha = 0.25;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();
}

function drawPlayer() {
  const p = player;

  // Trail
  p.trail.push({x:p.x, y:p.y});
  if (p.trail.length > 12) p.trail.shift();
  for (let i=0; i<p.trail.length; i++) {
    const alpha = (i/p.trail.length)*0.3;
    ctx.beginPath();
    ctx.arc(p.trail[i].x, p.trail[i].y, p.r*0.5*(i/p.trail.length), 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,240,255,${alpha})`;
    ctx.fill();
  }

  // Invincibility flicker
  if (p.invincible > 0 && frameCount%4 < 2) { ctx.restore?.(); return; }

  // Shield ring
  if (p.shield > 0) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r + 8, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,240,255,0.6)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00F0FF';
    ctx.shadowBlur = 10;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Body — hexagon player ship
  ctx.save();
  ctx.translate(p.x, p.y);

  // Glow
  const grad = ctx.createRadialGradient(0,0,0, 0,0,p.r*1.5);
  grad.addColorStop(0, 'rgba(0,240,255,0.2)');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(0,0,p.r*1.5,0,Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Ship body
  ctx.shadowColor = '#00F0FF';
  ctx.shadowBlur = 20;
  ctx.strokeStyle = '#00F0FF';
  ctx.fillStyle = 'rgba(0,240,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i=0;i<6;i++) {
    const a = (i/6)*Math.PI*2 - Math.PI/6;
    i===0 ? ctx.moveTo(Math.cos(a)*p.r, Math.sin(a)*p.r)
           : ctx.lineTo(Math.cos(a)*p.r, Math.sin(a)*p.r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(0,0,4,0,Math.PI*2);
  ctx.fillStyle = '#00F0FF';
  ctx.fill();

  ctx.restore();
}

// ─────────────────────────────────────────────────────────
//  MAIN UPDATE
// ─────────────────────────────────────────────────────────
function update() {
  if (state !== STATE.PLAYING) return;
  frameCount++;

  // Move player via joystick
  if (joy.active && joy.dist > 5) {
    const norm = Math.min(joy.dist/50, 1);
    const nx = joy.dx / joy.dist;
    const ny = joy.dy / joy.dist;
    player.x = Math.max(player.r, Math.min(canvas.width-player.r,  player.x + nx*player.speed*norm));
    player.y = Math.max(player.r, Math.min(canvas.height-player.r, player.y + ny*player.speed*norm));
  }

  // Auto-shoot if button held
  if (shooting) fireWeapon();

  // Invincibility countdown
  if (player.invincible > 0) player.invincible--;

  // Regen
  if (player.regen > 0 && frameCount%120===0) {
    player.hp = Math.min(player.maxHp, player.hp + player.regen);
    updateHUD();
  }

  // ── Bullets ──────────────────────────────────────────
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;

    if (b.life <= 0 || b.x<-20 || b.x>canvas.width+20 || b.y<-20 || b.y>canvas.height+20) {
      bullets.splice(i,1); continue;
    }

    if (b.enemy) {
      // Enemy bullet hitting player
      if (!player.invincible && Math.hypot(b.x-player.x, b.y-player.y) < player.r+b.r) {
        if (player.shield > 0) {
          player.shield--;
          spawnParticles(player.x, player.y, '#00F0FF', 15, 3);
        } else {
          player.hp -= b.damage;
          player.invincible = 40;
          spawnParticles(player.x, player.y, '#FF2D6B', 8, 2);
          showDamage(player.x, player.y, b.damage, '#FF2D6B');
          if (player.hp <= 0) { gameOver(); return; }
        }
        bullets.splice(i,1);
        updateHUD();
      }
      continue;
    }

    // Player bullet hitting enemies
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(b.x-e.x, b.y-e.y) < e.r+b.r) {
        e.hp -= b.damage;
        e.flash = 8;
        showDamage(e.x, e.y - e.r - 5, b.damage, WEAPONS[currentWeapon].color);
        spawnParticles(b.x, b.y, b.color, 5, 2);
        b.hits++;

        if (e.hp <= 0) {
          spawnParticles(e.x, e.y, e.color, 18, 4);
          spawnOrb(e.x, e.y, e.xp);
          score += e.score * wave;
          kills++;
          enemies.splice(j,1);
          updateHUD();
        }

        if (b.hits > b.pierce) { bullets.splice(i,1); break; }
      }
    }
  }

  // ── Enemies ──────────────────────────────────────────
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    e.pulseT += 0.05;
    if (e.flash > 0) e.flash--;

    // Move toward player
    const angle = Math.atan2(player.y-e.y, player.x-e.x);
    e.angle = angle;

    // Boss: circle player
    if (e.shape === 'boss') {
      const dist = Math.hypot(player.x-e.x, player.y-e.y);
      if (dist > 200) {
        e.x += Math.cos(angle)*e.speed;
        e.y += Math.sin(angle)*e.speed;
      } else {
        e.x += Math.cos(angle+Math.PI/2)*e.speed*0.8;
        e.y += Math.sin(angle+Math.PI/2)*e.speed*0.8;
      }
      // Boss multi-shot
      e.shootTimer++;
      if (e.shootTimer >= 60) {
        e.shootTimer = 0;
        for (let k=0;k<8;k++) {
          const a = (k/8)*Math.PI*2;
          bullets.push({ x:e.x, y:e.y, vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5,
            r:6, color:'#C000FF', damage:20, pierce:0, hits:0, life:120, enemy:true });
        }
      }
    } else if (e.shape === 'sniper') {
      // Sniper stays at distance
      const dist = Math.hypot(player.x-e.x, player.y-e.y);
      if (dist < 200) {
        e.x -= Math.cos(angle)*e.speed;
        e.y -= Math.sin(angle)*e.speed;
      }
      e.shootTimer++;
      if (e.shootTimer >= e.shootInterval) {
        e.shootTimer = 0;
        enemyShoot(e);
      }
    } else {
      e.x += Math.cos(angle)*e.speed;
      e.y += Math.sin(angle)*e.speed;
    }

    // Player collision
    if (!player.invincible && Math.hypot(e.x-player.x, e.y-player.y) < e.r+player.r) {
      if (player.shield > 0) {
        player.shield--;
        spawnParticles(player.x, player.y, '#00F0FF', 15, 3);
        enemies.splice(i,1);
      } else {
        player.hp -= e.damage;
        player.invincible = 50;
        spawnParticles(player.x, player.y, '#FF2D6B', 12, 3);
        showDamage(player.x, player.y, e.damage, '#FF2D6B');
        if (player.hp <= 0) { gameOver(); return; }
        updateHUD();
      }
    }
  }

  // ── XP Orbs ──────────────────────────────────────────
  for (let i = orbs.length-1; i >= 0; i--) {
    const o = orbs[i];
    o.t += 0.06; o.life--;

    if (player.magnet > 0 || Math.hypot(o.x-player.x, o.y-player.y) < 60) {
      const ang = Math.atan2(player.y-o.y, player.x-o.x);
      o.x += Math.cos(ang)*4;
      o.y += Math.sin(ang)*4;
    } else {
      o.x += o.vx * 0.95;
      o.y += o.vy * 0.95;
    }

    if (o.life <= 0 || Math.hypot(o.x-player.x, o.y-player.y) < player.r) {
      gainXP(o.xp);
      spawnParticles(o.x, o.y, '#39FF14', 5, 2);
      orbs.splice(i,1);
      updateHUD();
    }
  }

  // ── Particles ────────────────────────────────────────
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life--;
    if (p.life <= 0) particles.splice(i,1);
  }

  // ── Wave clear ───────────────────────────────────────
  if (enemies.length === 0 && state === STATE.PLAYING) {
    wave++;
    score += wave * 50;
    player.bombs = Math.min(player.bombs+1, 9);
    updateHUD();
    setTimeout(() => spawnWave(wave), 2000);
  }
}

// ─────────────────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#04060F';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Stars
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.fill();
  }

  // Arena circle (subtle)
  const cx = canvas.width/2, cy = canvas.height/2;
  const arenaR = Math.min(canvas.width, canvas.height)*0.48;
  ctx.beginPath();
  ctx.arc(cx, cy, arenaR, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,240,255,0.05)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Grid floor
  ctx.save();
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#00F0FF';
  ctx.lineWidth = 0.5;
  const gridSize = 50;
  for (let x=0; x<canvas.width; x+=gridSize) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
  for (let y=0; y<canvas.height; y+=gridSize) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
  ctx.restore();

  if (state === STATE.GAMEOVER) return;

  // XP Orbs
  for (const o of orbs) {
    ctx.save();
    ctx.shadowColor = '#39FF14';
    ctx.shadowBlur = 8;
    const pulse = 0.85 + Math.sin(o.t)*0.15;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r*pulse, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(57,255,20,0.2)';
    ctx.fill();
    ctx.strokeStyle = '#39FF14';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Enemies
  for (const e of enemies) {
    // HP bar
    if (e.hp < e.maxHp) {
      const bw = e.r*2.5, bh = 4;
      const bx = e.x - bw/2, by = e.y - e.r - 10;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = e.color;
      ctx.fillRect(bx, by, bw*(e.hp/e.maxHp), bh);
    }

    const pScale = 1 + Math.sin(e.pulseT)*0.05;
    drawShape(e.x, e.y, e.r*pScale, e.shape, e.color, e.pulseT, e.flash);
  }

  // Bullets
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = b.enemy ? 8 : 12;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
    // Bullet trail
    ctx.beginPath();
    ctx.moveTo(b.x - b.vx*3, b.y - b.vy*3);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = b.color;
    ctx.globalAlpha = 0.4;
    ctx.lineWidth = b.r;
    ctx.stroke();
    ctx.restore();
  }

  // Player
  drawPlayer();
}

// ─────────────────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────────────────
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ─────────────────────────────────────────────────────────
//  GAME OVER
// ─────────────────────────────────────────────────────────
function gameOver() {
  state = STATE.GAMEOVER;
  if (score > bestScore) { bestScore = score; localStorage.setItem('novaScore', score); }
  if (wave  > bestWave)  { bestWave  = wave;  localStorage.setItem('novaWave',  wave);  }

  document.getElementById('goScore').textContent = score.toLocaleString();
  document.getElementById('goWave').textContent  = wave;
  document.getElementById('goKills').textContent = kills;
  document.getElementById('goBest').textContent  = bestScore.toLocaleString();
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

// ─────────────────────────────────────────────────────────
//  TOUCH / CONTROLS
// ─────────────────────────────────────────────────────────
const joystickZone = document.getElementById('joystickZone');
const joystickBase = document.getElementById('joystickBase');
const joystickKnob = document.getElementById('joystickKnob');
const shootBtn     = document.getElementById('shootBtn');
const bombBtn      = document.getElementById('bombBtn');

const baseLeft = () => joystickBase.getBoundingClientRect().left + 50;
const baseTop  = () => joystickBase.getBoundingClientRect().top  + 50;

function startJoy(touch) {
  joy.active = true;
  joy.id = touch.identifier;
  joy.sx = touch.clientX;
  joy.sy = touch.clientY;
  joy.dx = joy.dy = joy.dist = 0;
}

function moveJoy(touch) {
  if (touch.identifier !== joy.id) return;
  joy.dx = touch.clientX - joy.sx;
  joy.dy = touch.clientY - joy.sy;
  joy.dist = Math.hypot(joy.dx, joy.dy);
  const max = 44;
  const clamped = Math.min(joy.dist, max);
  const nx = clamped * joy.dx / (joy.dist||1);
  const ny = clamped * joy.dy / (joy.dist||1);
  joystickKnob.style.transform = `translate(${nx}px,${ny}px)`;
}

function endJoy() {
  joy.active = false; joy.id = null;
  joy.dx = joy.dy = joy.dist = 0;
  joystickKnob.style.transform = 'translate(0,0)';
}

joystickZone.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) startJoy(t);
}, { passive:false });

joystickZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) moveJoy(t);
}, { passive:false });

joystickZone.addEventListener('touchend', e => {
  e.preventDefault();
  endJoy();
}, { passive:false });

// Shoot button
shootBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  shooting = true;
  shootBtn.classList.add('firing');
}, { passive:false });

shootBtn.addEventListener('touchend', e => {
  e.preventDefault();
  shooting = false;
  shootBtn.classList.remove('firing');
}, { passive:false });

// Bomb button
bombBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === STATE.PLAYING) useBomb();
}, { passive:false });

// Keyboard fallback (desktop testing)
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') { shooting = true; e.preventDefault(); }
  if (e.key === 'b' || e.key === 'B') useBomb();
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (e.key === ' ') shooting = false;
});

// Keyboard movement
setInterval(() => {
  if (state !== STATE.PLAYING) return;
  const spd = player.speed;
  if (keys['ArrowLeft']  || keys['a']) player.x = Math.max(player.r, player.x - spd);
  if (keys['ArrowRight'] || keys['d']) player.x = Math.min(canvas.width-player.r, player.x + spd);
  if (keys['ArrowUp']    || keys['w']) player.y = Math.max(player.r, player.y - spd);
  if (keys['ArrowDown']  || keys['s']) player.y = Math.min(canvas.height-player.r, player.y + spd);
}, 16);

// ─────────────────────────────────────────────────────────
//  BUTTONS
// ─────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').classList.add('hidden');
  initGame();
  state = STATE.PLAYING;
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  initGame();
  state = STATE.PLAYING;
});

// Show best scores on start screen
if (bestScore > 0) {
  document.getElementById('startStats').style.display = 'flex';
  document.getElementById('bestScore').textContent = bestScore.toLocaleString();
  document.getElementById('bestWave').textContent  = bestWave;
}

// ─────────────────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────────────────
initStars();
gameLoop();
</script>
